  <style>
    * { margin: 0; box-sizing: border-box; }

    a {
      display: inline-flex; align-items: center; gap: 8px; background: #b76e79; color: #fff;
      font-weight: 700; padding: 14px 28px; border-radius: 999px; text-decoration: none;
      box-shadow: 0 8px 24px rgba(74,35,49,.16); transition: background .25s, transform .16s;
      min-height: 48px;
    }
    a:hover { background: #a04f5c; }
    a:active { transform: scale(.97); }
    a:focus-visible { outline: 3px solid #4a2331; outline-offset: 3px; }
    svg { width: 20px; height: 20px; }
  </style>
</head>
